<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FBF8F2"/><stop offset="1" stop-color="#F2ECE0"/>
  </linearGradient>
  <linearGradient id="page" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0" stop-color="#FFFEFB"/><stop offset="1" stop-color="#FBF6EC"/>
  </linearGradient>
  <linearGradient id="periV" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#8E8EE8"/><stop offset="0.5" stop-color="#5B5BD6"/><stop offset="1" stop-color="#4646B0"/>
  </linearGradient>
  <linearGradient id="periH" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#4646B0"/><stop offset="0.5" stop-color="#8E8EE8"/><stop offset="1" stop-color="#4646B0"/>
  </linearGradient>
  <radialGradient id="node" cx="0.35" cy="0.3" r="0.85">
    <stop offset="0" stop-color="#8E8EE8"/><stop offset="0.6" stop-color="#5B5BD6"/><stop offset="1" stop-color="#4646B0"/>
  </radialGradient>
  <radialGradient id="nodeC" cx="0.35" cy="0.3" r="0.85">
    <stop offset="0" stop-color="#FFB3A4"/><stop offset="0.6" stop-color="#FF7E67"/><stop offset="1" stop-color="#E8654E"/>
  </radialGradient>
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
    <feColorMatrix in="n" type="saturate" values="0"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.035"/></feComponentTransfer>
  </filter>
  <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#2C2B45" flood-opacity="0.16"/>
  </filter>
  <filter id="softS" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#2C2B45" flood-opacity="0.16"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
